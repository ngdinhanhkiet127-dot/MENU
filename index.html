<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Cookie SMP</title>
    <style>
        body { margin: 0; padding: 20px; background-color: #0d0d0d; color: white; 
               font-family: 'Arial', sans-serif; text-align: center; }

        /* Hiệu ứng cầu vồng chạy */
        .rainbow-text {
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbow-wave 4s linear infinite;
        }

        @keyframes rainbow-wave { 0% { background-position: 0%; } 100% { background-position: 300%; } }

        /* Nút bấm tông Hồng + Hiệu ứng Cầu Vồng */
        .btn {
            display: block; width: 250px; margin: 15px auto; padding: 15px;
            border-radius: 50px; text-decoration: none; font-weight: bold;
            color: white; border: none; cursor: pointer; font-size: 16px;
            background: linear-gradient(45deg, #ff69b4, #ff1493); /* Nền hồng */
            /* Hiệu ứng cầu vồng nhẹ viền */
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            background: linear-gradient(90deg, #ff00ff, #ff1493, #ff69b4);
            box-shadow: 0 0 15px #ff69b4;
        }

        .ip-box { background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 20px 0; border: 1px solid #ff69b4; }
    </style>
</head>
<body>

    <h1 class="rainbow-text">COOKIE SMP</h1>
    <p>Cộng đồng sinh tồn chuyên nghiệp</p>

    <div class="ip-box">
        IP: <span id="serverIp">Play1.nvnmc.top:25589</span>
    </div>
    <button class="btn" onclick="copyIP()">COPY IP</button>

    <a href="https://discord.gg/link-cua-ban" class="btn">DISCORD</a>
    
    <a href="https://link4m.com/link-cua-ban" class="btn" style="background: linear-gradient(45deg, #00ffcc, #00bfff);">ỦNG HỘ SERVER (Vượt Link)</a>

    <script>
        function copyIP() {
            var text = document.getElementById("serverIp").innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("Đã copy IP: " + text);
            });
        }
    </script>
</body>
</html>
